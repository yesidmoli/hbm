<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GranjaIQ — Diagnóstico Porcícola</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111008;
  --bg2: #1C1810;
  --bg3: #2A2218;
  --bg4: #3A3025;
  --oro: #C8960A;
  --oro-light: #E8B020;
  --oro-dim: rgba(200,150,10,0.15);
  --verde: #2D6A4F;
  --verde-g: #52B788;
  --rojo: #C0392B;
  --rojo-s: #E55039;
  --amarillo: #D4A017;
  --crema: #F0E6C8;
  --crema-d: #A89878;
  --blanco: #FAF6EC;
  --borde: rgba(200,150,10,0.12);
  --borde2: rgba(240,230,200,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--crema);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--borde);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform .3s}
.main{margin-left:260px;flex:1;min-height:100vh}

/* SIDEBAR */
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--borde)}
.sb-logo h1{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--oro);letter-spacing:-.5px}
.sb-logo h1 span{color:var(--verde-g)}
.sb-logo p{font-size:11px;color:var(--crema-d);margin-top:3px;letter-spacing:.3px}
.sb-granja{padding:14px 20px;border-bottom:1px solid var(--borde);background:var(--oro-dim)}
.sb-granja-name{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--blanco)}
.sb-granja-sub{font-size:11px;color:var(--crema-d);margin-top:2px}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.sb-section{padding:8px 20px 4px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--crema-d);opacity:.6}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--crema-d);cursor:pointer;transition:all .15s;border-left:2px solid transparent;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--crema)}
.sb-item.active{background:var(--bg3);color:var(--oro-light);border-left-color:var(--oro)}
.sb-item.done .sb-check{color:var(--verde-g)}
.sb-item .sb-num{width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-item.active .sb-num{background:var(--oro);color:var(--bg)}
.sb-item.done .sb-num{background:var(--verde);color:white}
.sb-footer{padding:16px 20px;border-top:1px solid var(--borde)}
.sb-progress{margin-bottom:8px}
.sb-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--crema-d);margin-bottom:6px}
.sb-prog-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--verde),var(--verde-g));border-radius:2px;transition:width .4s ease}

/* TOPBAR */
.topbar{padding:16px 32px;border-bottom:1px solid var(--borde);display:flex;justify-content:space-between;align-items:center;background:rgba(17,16,8,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40}
.topbar-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--blanco)}
.topbar-sub{font-size:12px;color:var(--crema-d);margin-top:2px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.badge{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:100px}
.badge-oro{background:var(--oro-dim);color:var(--oro-light);border:1px solid rgba(200,150,10,.3)}
.badge-verde{background:rgba(82,183,136,.1);color:var(--verde-g);border:1px solid rgba(82,183,136,.3)}

/* CONTENT */
.content{padding:32px}
.section-card{background:var(--bg2);border:1px solid var(--borde);border-radius:14px;padding:28px;margin-bottom:20px}
.section-card-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:4px}
.section-card-sub{font-size:13px;color:var(--crema-d);margin-bottom:24px;font-weight:300}

/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;font-weight:500;color:var(--crema-d);letter-spacing:.3px}
.form-label span{color:var(--crema-d);font-weight:300;margin-left:4px;font-size:11px}
.form-input{background:var(--bg3);border:1px solid var(--borde2);border-radius:8px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--crema);outline:none;transition:border-color .2s;-moz-appearance:textfield}
.form-input::-webkit-inner-spin-button,.form-input::-webkit-outer-spin-button{-webkit-appearance:none}
.form-input:focus{border-color:rgba(200,150,10,.4);background:var(--bg4)}
.form-input::placeholder{color:var(--crema-d);opacity:.5}
.form-select{background:var(--bg3);border:1px solid var(--borde2);border-radius:8px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--crema);outline:none;cursor:pointer;transition:border-color .2s}
.form-select:focus{border-color:rgba(200,150,10,.4)}
.form-select option{background:var(--bg3)}

/* PARAM TABLE */
.param-table{width:100%;border-collapse:collapse}
.param-table th{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--crema-d);padding:10px 12px;text-align:left;border-bottom:1px solid var(--borde)}
.param-table th.center{text-align:center}
.param-table td{padding:8px 12px;border-bottom:1px solid var(--borde2);vertical-align:middle}
.param-table tr:last-child td{border-bottom:none}
.param-name{font-size:13px;color:var(--crema);font-weight:500}
.param-unit{font-size:11px;color:var(--crema-d);margin-top:1px}
.param-input{background:var(--bg3);border:1px solid var(--borde2);border-radius:6px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--crema);outline:none;width:100%;text-align:center;transition:border-color .2s;-moz-appearance:textfield}
.param-input::-webkit-inner-spin-button,.param-input::-webkit-outer-spin-button{-webkit-appearance:none}
.param-input:focus{border-color:rgba(200,150,10,.4);background:var(--bg4)}
.param-input.historico:focus{border-color:rgba(82,183,136,.4)}
.param-diff{font-size:12px;font-weight:600;text-align:center;min-width:60px}
.diff-pos{color:var(--verde-g)}
.diff-neg{color:var(--rojo-s)}
.diff-neu{color:var(--crema-d)}
.trend-icon{font-size:14px}

/* DIETAS */
.dieta-fase{background:var(--bg3);border:1px solid var(--borde2);border-radius:10px;padding:16px;margin-bottom:10px;position:relative}
.dieta-fase-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dieta-fase-title{font-size:13px;font-weight:600;color:var(--crema)}
.dieta-fase-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.btn-add-fase{display:flex;align-items:center;gap:8px;background:transparent;border:1px dashed rgba(200,150,10,.3);border-radius:8px;padding:10px 16px;color:var(--oro-light);font-size:13px;cursor:pointer;transition:all .2s;width:100%;justify-content:center;font-family:'DM Sans',sans-serif;margin-top:8px}
.btn-add-fase:hover{background:var(--oro-dim);border-color:var(--oro)}
.btn-del{background:none;border:none;color:var(--crema-d);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color .2s;line-height:1}
.btn-del:hover{color:var(--rojo-s)}

/* PLAN SANITARIO TOGGLE */
.toggle-mode{display:flex;background:var(--bg3);border:1px solid var(--borde2);border-radius:8px;padding:3px;width:fit-content;margin-bottom:20px}
.toggle-btn{padding:7px 18px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--crema-d);font-family:'DM Sans',sans-serif;transition:all .2s}
.toggle-btn.active{background:var(--oro);color:var(--bg);font-weight:600}

/* BUTTONS */
.btn-primary{background:var(--oro);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:12px 28px;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:var(--oro-light);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--crema);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:12px 24px;border:1px solid var(--borde2);border-radius:8px;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:rgba(240,230,200,.3);background:var(--bg3)}
.btn-row{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}

/* RESULTS */
.result-hero{background:linear-gradient(135deg,rgba(192,57,43,.15),rgba(200,150,10,.08));border:1px solid rgba(192,57,43,.25);border-radius:16px;padding:32px;margin-bottom:24px;text-align:center;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(192,57,43,.12),transparent 70%);pointer-events:none}
.result-total-label{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--crema-d);margin-bottom:10px}
.result-total-num{font-family:'Fraunces',serif;font-size:64px;font-weight:900;color:var(--rojo-s);letter-spacing:-3px;line-height:1}
.result-total-usd{font-size:16px;color:var(--crema-d);margin-top:8px;font-weight:300}
.result-meta{display:flex;justify-content:center;gap:40px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.result-meta-item{text-align:center}
.result-meta-num{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--crema)}
.result-meta-lbl{font-size:11px;color:var(--crema-d);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.result-note{background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--crema-d);margin-bottom:20px;line-height:1.6}
.result-note strong{color:var(--oro-light)}

/* RANKING */
.ranking-item{display:grid;grid-template-columns:36px 1fr 130px 100px;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--borde2);transition:all .2s;cursor:default}
.ranking-item:hover{background:var(--bg3);border-color:var(--borde)}
.rank-pos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rp1{background:var(--rojo-s);color:white}
.rp2{background:var(--amarillo);color:var(--bg)}
.rp3{background:rgba(212,160,23,.35);color:var(--crema)}
.rpn{background:var(--bg4);color:var(--crema-d)}
.rank-info{}
.rank-name{font-size:14px;font-weight:500;color:var(--blanco)}
.rank-detail{font-size:11px;color:var(--crema-d);margin-top:2px}
.rank-bar-wrap{display:flex;align-items:center;gap:8px}
.rank-bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.fill-danger{background:var(--rojo-s)}
.fill-warning{background:var(--amarillo)}
.fill-ok{background:var(--verde-g)}
.rank-amount{font-family:'Fraunces',serif;font-size:15px;font-weight:700;text-align:right}
.ra-danger{color:var(--rojo-s)}
.ra-warning{color:var(--amarillo)}
.ra-ok{color:var(--verde-g)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;width:fit-content;margin-bottom:24px}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--crema-d);font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.active{background:var(--bg2);color:var(--crema);box-shadow:0 1px 6px rgba(0,0,0,.3)}

/* ALERTS */
.alert-info{background:rgba(82,183,136,.06);border:1px solid rgba(82,183,136,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--verde-g);margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}

/* DIVIDER */
.divider{height:1px;background:var(--borde);margin:24px 0}

/* MOBILE HAMBURGER */
.hamburger{display:none;background:none;border:none;color:var(--crema);font-size:22px;cursor:pointer;padding:4px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49}

/* STEP INDICATOR */
.step-indicator{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s}
.step-dot.done{background:var(--verde);color:white}
.step-dot.active{background:var(--oro);color:var(--bg)}
.step-dot.pending{background:var(--bg4);color:var(--crema-d)}
.step-line{flex:1;height:2px;background:var(--bg4)}
.step-line.done{background:var(--verde)}

/* TOOLTIP */
.tooltip-wrap{position:relative;display:inline-flex;align-items:center}
.tooltip-icon{width:16px;height:16px;border-radius:50%;background:var(--bg4);color:var(--crema-d);font-size:10px;display:inline-flex;align-items:center;justify-content:center;cursor:help;margin-left:6px;border:1px solid var(--borde2);flex-shrink:0}
.tooltip-text{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--borde);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--crema);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;z-index:200;min-width:160px;text-align:center;max-width:220px;white-space:normal;line-height:1.5}
.tooltip-wrap:hover .tooltip-text{opacity:1}

/* SUMMARY CARD */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.summary-card{background:var(--bg3);border:1px solid var(--borde2);border-radius:10px;padding:16px}
.summary-card-num{font-family:'Fraunces',serif;font-size:26px;font-weight:900;line-height:1}
.summary-card-lbl{font-size:11px;color:var(--crema-d);text-transform:uppercase;letter-spacing:.7px;margin-top:5px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
  .overlay.show{display:block}
  .content{padding:20px}
  .form-grid{grid-template-columns:1fr}
  .form-grid-2{grid-template-columns:1fr}
  .dieta-fase-grid{grid-template-columns:1fr 1fr}
  .ranking-item{grid-template-columns:32px 1fr 90px}
  .rank-bar-wrap{display:none}
  .result-total-num{font-size:48px}
  .summary-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <h1>Granja<span>IQ</span></h1>
      <p>Diagnóstico Porcícola</p>
    </div>
    <div class="sb-granja" id="sb-granja-info">
      <div class="sb-granja-name" id="sb-farm-name">Nueva Granja</div>
      <div class="sb-granja-sub" id="sb-farm-sub">Sin configurar</div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Configuración</div>
      <div class="sb-item active" onclick="goTo('granja')" id="nav-granja">
        <div class="sb-num">1</div><span>Mi Granja</span>
      </div>
      <div class="sb-item" onclick="goTo('genetica')" id="nav-genetica">
        <div class="sb-num">2</div><span>Genética & Semen</span>
      </div>
      <div class="sb-item" onclick="goTo('dietas')" id="nav-dietas">
        <div class="sb-num">3</div><span>Dietas</span>
      </div>
      <div class="sb-item" onclick="goTo('sanitario')" id="nav-sanitario">
        <div class="sb-num">4</div><span>Plan Sanitario</span>
      </div>
      <div class="sb-section">Diagnóstico</div>
      <div class="sb-item" onclick="goTo('parametros')" id="nav-parametros">
        <div class="sb-num">5</div><span>Parámetros</span>
      </div>
      <div class="sb-item" onclick="goTo('resultados')" id="nav-resultados">
        <div class="sb-num">6</div><span>Resultados</span>
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-progress">
        <div class="sb-prog-label">
          <span>Progreso</span>
          <span id="prog-pct">0%</span>
        </div>
        <div class="sb-prog-track">
          <div class="sb-prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </aside>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="topbar-title">Mi Granja</div>
        <div class="topbar-sub" id="topbar-sub">Paso 1 de 6 — Configura tu granja</div>
      </div>
      <div class="topbar-actions">
        <span class="badge badge-oro" id="topbar-badge">En progreso</span>
      </div>
    </div>

    <div class="content" id="content">
      <!-- Rendered by JS -->
    </div>
  </main>
</div>

<script>

  // ADMIN DEFAULTS (controlled by super admin in real app)

// ═══════════════════════════════════════════════════════
// MATH ENGINE
// ═══════════════════════════════════════════════════════
function calcularGranja(params, granja, genetica, semen, dietas, sanitario, admin) {
  const h = parseFloat(granja.hembras) || 168;
  const precioKilo = parseFloat(granja.precio_kilo) || 9200;
  const fleteKg = parseFloat(dietas.flete) || 40;

  // Parámetros
  const fertilidad = params.fertilidad;
  const infertilidad = 1 - fertilidad;
  const nacidosTotales = params.nacidos_totales;
  const pctMomias = params.pct_momias / 100;
  const pctMuertos = params.pct_nacidos_muertos / 100;
  const pctMortLact = params.pct_mort_lactancia / 100;
  const pesDestete = params.peso_destete;
  const convPrecebos = params.conv_precebos;
  const pctMortJaul = params.pct_mort_jaulones / 100;
  const pesoSalidaPrec = params.peso_salida_precebos;
  const convCeba = params.conv_ceba;
  const pctMortCeba = params.pct_mort_ceba / 100;
  const pesoVenta = params.peso_venta;
  const diasAbiertos = params.dias_abiertos;

  // Ciclo reproductivo
  const largoCiclo = admin.largo_gestacion + admin.largo_lactancia + diasAbiertos;
  // Días improductivos por infertilidad
  const diasImproductivos = (infertilidad / fertilidad) *
    (admin.infertilidad_dist.d21 * 21 + admin.infertilidad_dist.d42 * 42 +
     admin.infertilidad_dist.d63 * 63 + admin.infertilidad_dist.d85 * 85);
  const cicloPorHembra = largoCiclo + diasImproductivos / (365 / largoCiclo);
  const partosPorHembra = 365 / cicloPorHembra;

  // Flujo productivo
  const nacidosVivos = nacidosTotales * (1 - pctMomias - pctMuertos);
  const desTosParto = nacidosVivos * (1 - pctMortLact);
  const destHembraAnio = desTosParto * partosPorHembra;
  const totalDestetos = destHembraAnio * h;

  const traslados = totalDestetos * (1 - pctMortJaul);
  const cerdosVendidos = traslados * (1 - pctMortCeba);
  const kilosVendidos = cerdosVendidos * pesoVenta;
  const ingresos = kilosVendidos * precioKilo;

  // COSTOS DE ALIMENTO — MADRES (por hembra/año)
  let costoAlimentoMadres = 0;
  for (const fase of dietas.madres) {
    costoAlimentoMadres += (fase.dias * fase.consumo * (fase.precio + fleteKg)) * partosPorHembra;
  }
  // Improductividad
  const consumoPromedioMadre = dietas.madres.reduce((s, f) => s + f.dias * f.consumo, 0) /
    dietas.madres.reduce((s, f) => s + f.dias, 1);
  costoAlimentoMadres += diasImproductivos * consumoPromedioMadre *
    (dietas.madres[0]?.precio + fleteKg || 1550);

  // COSTOS DE ALIMENTO — PRECEBOS (por cerdo)
  let costoAlimentoPrecebos = 0;
  for (const fase of dietas.precebos) {
    costoAlimentoPrecebos += fase.dias * fase.consumo * (fase.precio + fleteKg);
  }

  // COSTOS DE ALIMENTO — CEBA (por cerdo)
  let costoAlimentoCeba = 0;
  for (const fase of dietas.ceba) {
    costoAlimentoCeba += fase.dias * fase.consumo * (fase.precio + fleteKg);
  }

  // COSTO ALIMENTO POR CERDO VENDIDO (cría proporcional)
  const costoAlimentoCriaXCerdo = (costoAlimentoMadres * h) / (cerdosVendidos || 1);

  // SEMEN
  const totalServicios = (totalDestetos / desTosParto * (1 / fertilidad));
  const botellasXParto = (totalServicios * semen.botellas_por_servicio) / (totalDestetos / desTosParto || 1);
  const costoSemenHembra = botellasXParto * semen.precio_botella * partosPorHembra;
  const costoSemenXCerdo = (costoSemenHembra * h) / (cerdosVendidos || 1);

  // GENÉTICA (costo diferido por cerdo)
  const costoPrimXHembra = ((genetica.costo_primeriza - genetica.costo_primeriza * genetica.descarte_primer_anio * genetica.pct_precio_descarte) / genetica.partos_diferir) * genetica.tasa_reemplazo;
  const costoGeneticaXCerdo = (costoPrimXHembra * h) / (cerdosVendidos || 1);

  // PLAN SANITARIO
  let costoSanitarioMadre = 0;
  let costoSanitarioPrecebo = 0;
  let costoSanitarioCeba = 0;
  if (sanitario.modo === 'simple') {
    const s = sanitario.simple;
    const pctBio = 1 + (s.pct_bioseguridad || 0.2);
    costoSanitarioMadre = ((s.primeriza + s.gestacion + s.lactancia) * pctBio * genetica.tasa_reemplazo);
    costoSanitarioPrecebo = s.precebos * pctBio;
    costoSanitarioCeba = s.ceba * pctBio;
  }
  const costoSanitarioXCerdo = (costoSanitarioMadre * h / (cerdosVendidos || 1)) +
    costoSanitarioPrecebo + costoSanitarioCeba;

  // MANO DE OBRA
  const costoOperarioAnio = admin.salario_minimo * 12 * (1 + admin.cargas);
  const operariosCria = Math.ceil(h / admin.cerdas_gestacion_x_operario) + Math.ceil(h * 0.15 / admin.cerdas_paridas_x_operario);
  const operariosDestete = Math.ceil((totalDestetos + traslados) / 2 / admin.cerdos_destete_x_operario);
  const costoMOCriaXCerdo = (operariosCria * costoOperarioAnio) / (cerdosVendidos || 1);
  const costoMODestetXCerdo = (operariosDestete * costoOperarioAnio) / (cerdosVendidos || 1);

  // MANTENIMIENTO
  const costoMantCriaXCerdo = (admin.infra_hembra * h * admin.pct_mant_cria) / (cerdosVendidos || 1);
  const costoMantPreceboXCerdo = admin.infra_precebo * admin.pct_mant_precebo;
  const costoMantCebaXCerdo = admin.infra_ceba * admin.pct_mant_ceba;

  // ADMINISTRACIÓN
  const costoTotalOperativo = (costoAlimentoCriaXCerdo + costoAlimentoPrecebos + costoAlimentoCeba + costoMOCriaXCerdo + costoMODestetXCerdo) * cerdosVendidos;
  const costoAdmonXCerdo = (costoTotalOperativo * admin.pct_admon * 0.01 * 1.6) / (cerdosVendidos || 1);

  // COSTO TOTAL POR CERDO
  const costoTotalXCerdo = costoAlimentoCriaXCerdo + costoAlimentoPrecebos + costoAlimentoCeba +
    costoSemenXCerdo + costoGeneticaXCerdo + costoSanitarioXCerdo +
    costoMOCriaXCerdo + costoMODestetXCerdo +
    costoMantCriaXCerdo + costoMantPreceboXCerdo + costoMantCebaXCerdo +
    costoAdmonXCerdo;

  const precioXCerdo = precioKilo * pesoVenta;
  const utilidadXCerdo = precioXCerdo - costoTotalXCerdo;
  const utilidadTotal = utilidadXCerdo * cerdosVendidos;
  const costoXKilo = costoTotalXCerdo / (pesoVenta || 1);

  return {
    cerdosVendidos, totalDestetos, kilosVendidos, ingresos,
    costoTotalXCerdo, costoXKilo, precioXCerdo,
    utilidadXCerdo, utilidadTotal,
    partosPorHembra, destHembraAnio,
    costoAlimentoCriaXCerdo, costoAlimentoPrecebos, costoAlimentoCeba,
    costoSemenXCerdo, costoGeneticaXCerdo, costoSanitarioXCerdo,
    costoMOCriaXCerdo, costoMODestetXCerdo,
    costoMantCriaXCerdo, costoMantPreceboXCerdo, costoMantCebaXCerdo,
    costoAdmonXCerdo,
  };
}

function calcularSensibilidad() {
  const base = calcularGranja(state.params.actual, state.granja, state.genetica,
    state.semen, state.dietas, state.sanitario, state.admin);

  const resultados = [];
  for (const meta of PARAM_META) {
    const paramsModif = { ...state.params.actual };
    paramsModif[meta.key] = state.params.historico[meta.key];
    const modificado = calcularGranja(paramsModif, state.granja, state.genetica,
      state.semen, state.dietas, state.sanitario, state.admin);
    const difAnio = modificado.utilidadTotal - base.utilidadTotal;
    if (Math.abs(difAnio) > 0) {
      resultados.push({
        ...meta,
        difAnio,
        actual: state.params.actual[meta.key],
        historico: state.params.historico[meta.key],
        utilBase: base.utilidadTotal,
        utilModif: modificado.utilidadTotal,
      });
    }
  }
  resultados.sort((a, b) => Math.abs(b.difAnio) - Math.abs(a.difAnio));

  // Total real (todos cambian juntos)
  const totalReal = calcularGranja(state.params.historico, state.granja, state.genetica,
    state.semen, state.dietas, state.sanitario, state.admin);
  const difTotal = totalReal.utilidadTotal - base.utilidadTotal;

  return { base, resultados, difTotal, totalReal };
}

// ═══════════════════════════════════════════════════════
// FORMATTERS
// ═══════════════════════════════════════════════════════
function fmt(num, moneda = state.granja.moneda) {
  const m = MONEDAS[moneda] || MONEDAS.COP;
  const rounded = Math.round(num / (m.decimales === 0 ? 1000 : 1)) * (m.decimales === 0 ? 1000 : 1);
  if (Math.abs(rounded) >= 1e9) return m.simbolo + (rounded / 1e9).toFixed(1) + 'B';
  if (Math.abs(rounded) >= 1e6) return m.simbolo + (rounded / 1e6).toFixed(1) + 'M';
  if (Math.abs(rounded) >= 1e3) return m.simbolo + (rounded / 1e3).toFixed(0) + 'K';
  return m.simbolo + rounded.toFixed(m.decimales);
}

function fmtFull(num, moneda = state.granja.moneda) {
  const m = MONEDAS[moneda] || MONEDAS.COP;
  return m.simbolo + Math.round(num).toLocaleString('es-CO');
}

function fmtUSD(num) {
  const trm = parseFloat(state.granja.trm) || 4200;
  const usd = num / trm;
  if (Math.abs(usd) >= 1e6) return 'US$' + (usd / 1e6).toFixed(2) + 'M';
  if (Math.abs(usd) >= 1e3) return 'US$' + (usd / 1e3).toFixed(1) + 'K';
  return 'US$' + usd.toFixed(0);
}

function goTo(page) {
  state.currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));

  const meta = PAGE_META[page];
  document.getElementById('topbar-title').textContent = meta.title;
  document.getElementById('topbar-sub').textContent = meta.sub;
  renderPage(page);
  updateProgress();
  closeSidebar();
  window.scrollTo(0, 0);

function updateProgress() {
  const total = 6;
  const done = state.completedSteps.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('topbar-badge').textContent = done === total ? 'Completo ✓' : 'En progreso';
  document.getElementById('topbar-badge').className = 'badge ' + (done === total ? 'badge-verde' : 'badge-oro');

    <div class="section-card-sub">Costos de inseminación artificial de tu granja</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Botellas / dosis por servicio</label>
        <input class="form-input" id="sem-botellas" type="number" step="0.5" value="${s.botellas_por_servicio}">
      </div>
      <div class="form-group">
        <label class="form-label">Precio por botella / dosis</label>
        <input class="form-input" id="sem-precio" type="number" value="${s.precio_botella}">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="goTo('granja')">← Atrás</button>
      <button class="btn-primary" onclick="saveGenetica()">Guardar y continuar →</button>
    </div>
  </div>`;
}

function saveGenetica() {
  state.genetica.costo_primeriza = parseFloat(document.getElementById('gen-costo').value) || 1400000;
  state.genetica.edad_compra = parseFloat(document.getElementById('gen-edad-compra').value) || 120;
  state.genetica.edad_monta = parseFloat(document.getElementById('gen-edad-monta').value) || 230;
  state.genetica.descarte_primer_anio = parseFloat(document.getElementById('gen-descarte').value) || 0.1;
  state.genetica.partos_diferir = parseFloat(document.getElementById('gen-partos-diferir').value) || 6;
  state.genetica.pct_precio_descarte = parseFloat(document.getElementById('gen-pct-descarte').value) || 0.6;
  state.genetica.tasa_reemplazo = parseFloat(document.getElementById('gen-reemplazo').value) || 0.415;
  state.semen.botellas_por_servicio = parseFloat(document.getElementById('sem-botellas').value) || 2.5;
  state.semen.precio_botella = parseFloat(document.getElementById('sem-precio').value) || 20000;
  state.completedSteps.add('genetica');
  updateProgress();
  goTo('dietas');
}

// ─── PAGE 3: DIETAS ───
function renderDietas() {
  return `
  <div class="section-card">
    <div class="section-card-title">Dietas — Madres</div>
    <div class="section-card-sub">Ciclo reproductivo: gestación, lactancia y flushing. Agrega o elimina fases según tu programa.</div>
    <div id="fases-madres"></div>
    <button class="btn-add-fase" onclick="addFase('madres')">+ Agregar fase</button>
  </div>
  <div class="section-card">
    <div class="section-card-title">Dietas — Precebos / Jaulones</div>
    <div class="section-card-sub">Desde destete hasta traslado a ceba.</div>
    <div id="fases-precebos"></div>
    <button class="btn-add-fase" onclick="addFase('precebos')">+ Agregar fase</button>
  </div>
  <div class="section-card">
    <div class="section-card-title">Dietas — Ceba / Engorde</div>
    <div class="section-card-sub">Desde traslado hasta peso de venta.</div>
    <div id="fases-ceba"></div>
    <button class="btn-add-fase" onclick="addFase('ceba')">+ Agregar fase</button>
  </div>
  <div class="section-card">
    <div class="section-card-title">Flete de alimento</div>
    <div class="section-card-sub">Costo de transporte por kilo de alimento entregado en granja.</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Costo flete por kg <span>(aplica a todas las dietas)</span></label>
        <input class="form-input" id="flete-kg" type="number" step="1" value="${state.dietas.flete}">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="goTo('genetica')">← Atrás</button>
      <button class="btn-primary" onclick="saveDietas()">Guardar y continuar →</button>
    </div>
  </div>`;
}

function renderDietasPhase() {
  ['madres', 'precebos', 'ceba'].forEach(tipo => {
    const cont = document.getElementById('fases-' + tipo);
    if (!cont) return;
    cont.innerHTML = state.dietas[tipo].map((fase, i) => `
      <div class="dieta-fase">
        <div class="dieta-fase-header">
          <input class="form-input" style="max-width:220px" type="text" value="${fase.nombre}" onchange="updateFase('${tipo}',${i},'nombre',this.value)" placeholder="Nombre de la fase">
          <button class="btn-del" onclick="delFase('${tipo}',${i})" title="Eliminar fase">✕</button>
        </div>
        <div class="dieta-fase-grid">
          <div class="form-group">
            <label class="form-label">Días</label>
            <input class="form-input" type="number" step="0.5" value="${fase.dias}" onchange="updateFase('${tipo}',${i},'dias',this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Consumo/día <span>(kg)</span></label>
            <input class="form-input" type="number" step="0.01" value="${fase.consumo}" onchange="updateFase('${tipo}',${i},'consumo',this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Precio/kg <span>(sin flete)</span></label>
            <input class="form-input" type="number" step="1" value="${fase.precio}" onchange="updateFase('${tipo}',${i},'precio',this.value)">
          </div>
          <div class="form-group">
            <label class="form-label">Costo total fase</label>
            <div class="form-input" style="color:var(--oro-light);font-weight:600">${fmtFull(fase.dias * fase.consumo * (fase.precio + (parseFloat(document.getElementById('flete-kg')?.value) || state.dietas.flete)))}</div>
          </div>
        </div>
      </div>`).join('');
  });
}

function updateFase(tipo, idx, campo, val) {
  state.dietas[tipo][idx][campo] = campo === 'nombre' ? val : parseFloat(val) || 0;
  renderDietasPhase();
}
function addFase(tipo) {
  state.dietas[tipo].push({ nombre: 'Nueva fase', dias: 28, consumo: 1.5, precio: 1800 });
  renderDietasPhase();
}
function delFase(tipo, idx) {
  if (state.dietas[tipo].length <= 1) return;
  state.dietas[tipo].splice(idx, 1);
  renderDietasPhase();
}
function saveDietas() {
  state.dietas.flete = parseFloat(document.getElementById('flete-kg')?.value) || 40;
  state.completedSteps.add('dietas');
  updateProgress();
  goTo('sanitario');
}

// ─── PAGE 4: SANITARIO ───
function renderSanitario() {
  const modo = state.sanitario.modo;
  const s = state.sanitario.simple;
  return `
  <div class="section-card">
    <div class="section-card-title">Plan Sanitario</div>
    <div class="section-card-sub">Elige cómo quieres ingresar tus costos sanitarios</div>
    <div class="toggle-mode">
      <button class="toggle-btn ${modo==='simple'?'active':''}" onclick="setSanitarioModo('simple')">Modo simple</button>
      <button class="toggle-btn ${modo==='detallado'?'active':''}" onclick="setSanitarioModo('detallado')">Modo detallado</button>
    </div>
    <div id="sanitario-content">
      ${modo === 'simple' ? renderSanitarioSimple() : renderSanitarioDetallado()}
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="goTo('dietas')">← Atrás</button>
      <button class="btn-primary" onclick="saveSanitario()">Guardar y continuar →</button>
    </div>
  </div>`;
}

function renderSanitarioSimple() {
  const s = state.sanitario.simple;
  return `
  <div class="alert-info">💡 Ingresa el costo total de tu plan sanitario por etapa, incluyendo todos los productos que uses.</div>
  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Plan sanitario primeriza <span>(por animal)</span></label>
      <input class="form-input" id="san-prim" type="number" value="${s.primeriza}">
    </div>
    <div class="form-group">
      <label class="form-label">Plan sanitario gestación <span>(por ciclo)</span></label>
      <input class="form-input" id="san-gest" type="number" value="${s.gestacion}">
    </div>
    <div class="form-group">
      <label class="form-label">Plan sanitario lactancia <span>(por parto)</span></label>
      <input class="form-input" id="san-lact" type="number" value="${s.lactancia}">
    </div>
    <div class="form-group">
      <label class="form-label">Plan sanitario precebos <span>(por lechón)</span></label>
      <input class="form-input" id="san-prec" type="number" value="${s.precebos}">
    </div>
    <div class="form-group">
      <label class="form-label">Plan sanitario ceba <span>(por cerdo)</span></label>
      <input class="form-input" id="san-ceba" type="number" value="${s.ceba}">
    </div>
    <div class="form-group">
      <label class="form-label">% Desinfectantes y bioseguridad <span>(sobre subtotal)</span></label>
      <input class="form-input" id="san-bio" type="number" step="0.01" value="${s.pct_bioseguridad}">
    </div>
  </div>`;
}

function renderSanitarioDetallado() {
  const etapas = ['remplazos', 'gestacion', 'lactancia', 'precebos', 'ceba'];
  const nombres = { remplazos: 'Reemplazos/Primerizas', gestacion: 'Gestación', lactancia: 'Lactancia', precebos: 'Precebos', ceba: 'Ceba' };
  return etapas.map(etapa => {
    const items = state.sanitario.detallado[etapa];
    const total = items.reduce((s, i) => s + (i.precio * i.cantidad), 0);
    return `
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:14px;font-weight:600;color:var(--blanco)">${nombres[etapa]}</div>
        <div style="font-size:13px;color:var(--oro-light);font-family:'Fraunces',serif;font-weight:700">Total: ${fmtFull(total * 1.2)}</div>
      </div>
      <div id="san-det-${etapa}">
        ${items.map((item, i) => `
          <div style="display:grid;grid-template-columns:1fr 80px 90px 90px 36px;gap:8px;margin-bottom:6px;align-items:center">
            <input class="form-input" style="font-size:12px" type="text" value="${item.nombre}" placeholder="Producto" onchange="updateSanItem('${etapa}',${i},'nombre',this.value)">
            <input class="form-input" style="font-size:12px;text-align:center" type="text" value="${item.unidad}" placeholder="Unidad" onchange="updateSanItem('${etapa}',${i},'unidad',this.value)">
            <input class="form-input" style="font-size:12px;text-align:center" type="number" value="${item.precio}" placeholder="Precio" onchange="updateSanItem('${etapa}',${i},'precio',this.value)">
            <input class="form-input" style="font-size:12px;text-align:center" type="number" step="0.5" value="${item.cantidad}" placeholder="Cant." onchange="updateSanItem('${etapa}',${i},'cantidad',this.value)">
            <button class="btn-del" onclick="delSanItem('${etapa}',${i})">✕</button>
          </div>`).join('')}
      </div>
      <button class="btn-add-fase" onclick="addSanItem('${etapa}')">+ Agregar producto</button>
      <div style="font-size:11px;color:var(--crema-d);margin-top:6px">+20% desinfectantes y bioseguridad incluido automáticamente</div>
    </div>`;
  }).join('<div class="divider"></div>');
}

function bindSanitario() {}
function setSanitarioModo(modo) {
  state.sanitario.modo = modo;
  document.getElementById('sanitario-content').innerHTML = modo === 'simple' ? renderSanitarioSimple() : renderSanitarioDetallado();
  document.querySelectorAll('.toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && modo === 'simple') || (i === 1 && modo === 'detallado'));
  });
}
function updateSanItem(etapa, idx, campo, val) {
  state.sanitario.detallado[etapa][idx][campo] = campo === 'nombre' || campo === 'unidad' ? val : parseFloat(val) || 0;
}
function addSanItem(etapa) {
  state.sanitario.detallado[etapa].push({ nombre: 'Nuevo producto', unidad: 'Dosis', precio: 0, cantidad: 1 });
  setSanitarioModo('detallado');
}
function delSanItem(etapa, idx) {
  state.sanitario.detallado[etapa].splice(idx, 1);
  setSanitarioModo('detallado');
}
function saveSanitario() {
  if (state.sanitario.modo === 'simple') {
    state.sanitario.simple.primeriza = parseFloat(document.getElementById('san-prim')?.value) || 0;
    state.sanitario.simple.gestacion = parseFloat(document.getElementById('san-gest')?.value) || 0;
    state.sanitario.simple.lactancia = parseFloat(document.getElementById('san-lact')?.value) || 0;
    state.sanitario.simple.precebos = parseFloat(document.getElementById('san-prec')?.value) || 0;
    state.sanitario.simple.ceba = parseFloat(document.getElementById('san-ceba')?.value) || 0;
    state.sanitario.simple.pct_bioseguridad = parseFloat(document.getElementById('san-bio')?.value) || 0.2;
  }
  state.completedSteps.add('sanitario');
  updateProgress();
  goTo('parametros');
}

// ─── PAGE 5: PARÁMETROS ───
function renderParametros() {
  const a = state.params.actual; const h = state.params.historico;
  const rows = PARAM_META.map(meta => {
    const va = a[meta.key]; const vh = h[meta.key];
    const diff = vh - va;
    const mejor = meta.higherIsBetter ? diff > 0 : diff < 0;
    const igual = Math.abs(diff) < 0.001;
    const diffClass = igual ? 'diff-neu' : mejor ? 'diff-pos' : 'diff-neg';
    const icon = igual ? '—' : mejor ? '▲' : '▼';
    const diffFmt = meta.tipo === 'pct' || meta.tipo === 'pct_direct'
      ? (diff > 0 ? '+' : '') + diff.toFixed(2) + '%'
      : (diff > 0 ? '+' : '') + diff.toFixed(2);
    return `
    <tr>
      <td>
        <div class="param-name">${meta.nombre}
          <div class="tooltip-wrap">
            <span class="tooltip-icon">?</span>
            <span class="tooltip-text">${meta.desc}</span>
          </div>
        </div>
        <div class="param-unit">${meta.unidad}</div>
      </td>
      <td><input class="param-input" type="number" step="0.01" value="${va}" onchange="updateParam('actual','${meta.key}',this.value)"></td>
      <td><input class="param-input historico" type="number" step="0.01" value="${vh}" onchange="updateParam('historico','${meta.key}',this.value)"></td>
      <td><div class="param-diff ${diffClass}"><span class="trend-icon">${icon}</span> ${diffFmt}</div></td>
    </tr>`;
  }).join('');

  return `
  <div class="alert-info">
    🏆 <strong>Columna "Actual":</strong> cómo está tu granja hoy. <strong>Columna "Histórico mejor":</strong> el mejor desempeño que tu granja ya alcanzó. La diferencia es el dinero que estás dejando de ganar.
  </div>
  <div class="section-card" style="padding:0;overflow:hidden">
    <div style="padding:20px 24px 0">
      <div class="section-card-title">Los 14 Parámetros Productivos</div>
      <div class="section-card-sub">Ingresa tu situación actual vs tu mejor momento histórico</div>
    </div>
    <div style="overflow-x:auto">
      <table class="param-table" style="min-width:520px">
        <thead>
          <tr>
            <th style="width:200px">Parámetro</th>
            <th class="center" style="width:130px">Actual</th>
            <th class="center" style="width:130px" style="color:var(--verde-g)">Histórico mejor</th>
            <th class="center" style="width:100px">Diferencia</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-secondary" onclick="goTo('sanitario')">← Atrás</button>
    <button class="btn-primary" onclick="saveParametros()">Ver resultados →</button>
  </div>`;
}

function updateParam(tipo, key, val) {
  state.params[tipo][key] = parseFloat(val) || 0;
}
function saveParametros() {
  state.completedSteps.add('parametros');
  state.completedSteps.add('resultados');
  updateProgress();
  goTo('resultados');
}

// ─── PAGE 6: RESULTADOS ───
function renderResultados() {
  const { base, resultados, difTotal, totalReal } = calcularSensibilidad();
  const moneda = state.granja.moneda;
  const hembras = parseFloat(state.granja.hembras) || 168;
  const maxDif = Math.max(...resultados.map(r => Math.abs(r.difAnio)));

  const rows = resultados.map((r, i) => {
    const pct = maxDif > 0 ? Math.abs(r.difAnio) / maxDif * 100 : 0;
    const nivel = pct > 60 ? 'danger' : pct > 25 ? 'warning' : 'ok';
    const posClass = ['rp1','rp2','rp3','rpn','rpn','rpn','rpn','rpn','rpn','rpn','rpn','rpn','rpn','rpn'][i] || 'rpn';
    const valActual = r.tipo === 'pct' || r.tipo === 'pct_direct' ? r.actual.toFixed(2) + '%' : r.actual.toFixed(2);
    const valHist = r.tipo === 'pct' || r.tipo === 'pct_direct' ? r.historico.toFixed(2) + '%' : r.historico.toFixed(2);
    return `
    <div class="ranking-item">
      <div class="rank-pos ${posClass}">${i+1}</div>
      <div class="rank-info">
        <div class="rank-name">${r.nombre}</div>
        <div class="rank-detail">Actual: ${valActual} → Histórico: ${valHist}</div>
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-track">
          <div class="rank-bar-fill fill-${nivel}" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="rank-amount ra-${nivel}">${fmt(r.difAnio, moneda)}</div>
    </div>`;
  }).join('');

  const sumaIndividual = resultados.reduce((s, r) => s + Math.abs(r.difAnio), 0);

  return `
  <div class="result-hero">
    <div class="result-total-label">Pérdida anual total identificada</div>
    <div class="result-total-num">${fmt(difTotal, moneda)}</div>
    <div class="result-total-usd">${fmtUSD(difTotal)} · ${state.granja.nombre || 'Tu granja'} · ${hembras} hembras</div>
    <div class="result-meta">
      <div class="result-meta-item">
        <div class="result-meta-num">${Math.round(base.cerdosVendidos).toLocaleString()}</div>
        <div class="result-meta-lbl">Cerdos vendidos/año</div>
      </div>
      <div class="result-meta-item">
        <div class="result-meta-num">${fmt(base.costoXKilo, moneda)}</div>
        <div class="result-meta-lbl">Costo/kg actual</div>
      </div>
      <div class="result-meta-item">
        <div class="result-meta-num">${fmt(base.utilidadXCerdo, moneda)}</div>
        <div class="result-meta-lbl">Utilidad/cerdo actual</div>
      </div>
      <div class="result-meta-item">
        <div class="result-meta-num">${fmt(difTotal / hembras, moneda)}</div>
        <div class="result-meta-lbl">Pérdida/hembra/año</div>
      </div>
    </div>
  </div>

  <div class="result-note">
    <strong>⚠️ Nota sobre la interpretación:</strong> Los ${resultados.length} parámetros suman individualmente ${fmt(sumaIndividual, moneda)}, pero la pérdida real cuando todos mejoran juntos es <strong>${fmt(difTotal, moneda)}</strong>. La diferencia ocurre porque los parámetros están encadenados y se afectan entre sí. El número grande es el que importa para tomar decisiones.
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-card-num" style="color:var(--verde-g)">${fmt(totalReal.utilidadTotal, moneda)}</div>
      <div class="summary-card-lbl">Utilidad potencial total</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-num" style="color:var(--rojo-s)">${fmt(base.utilidadTotal, moneda)}</div>
      <div class="summary-card-lbl">Utilidad actual</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-num" style="color:var(--oro)">${Math.round(((totalReal.utilidadTotal - base.utilidadTotal) / Math.abs(base.utilidadTotal)) * 100)}%</div>
      <div class="summary-card-lbl">Mejora potencial</div>
    </div>
  </div>

  <div class="section-card" style="padding:16px">
    <div style="padding:0 8px 16px">
      <div class="section-card-title">Ranking de pérdidas por parámetro</div>
      <div class="section-card-sub">Ordenado de mayor a menor impacto económico</div>
    </div>
    ${rows}
  </div>

  <div class="section-card">
    <div class="section-card-title">Estructura de costos actual</div>
    <div class="section-card-sub">Desglose del costo de producción por cerdo vendido</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[
        ['Alimento cría', base.costoAlimentoCriaXCerdo],
        ['Alimento precebos', base.costoAlimentoPrecebos],
        ['Alimento ceba', base.costoAlimentoCeba],
        ['Semen', base.costoSemenXCerdo],
        ['Genética', base.costoGeneticaXCerdo],
        ['Plan sanitario', base.costoSanitarioXCerdo],
        ['Mano de obra', base.costoMOCriaXCerdo + base.costoMODestetXCerdo],
        ['Mantenimiento', base.costoMantCriaXCerdo + base.costoMantPreceboXCerdo + base.costoMantCebaXCerdo],
        ['Administración', base.costoAdmonXCerdo],
      ].map(([lbl, val]) => {
        const pct = base.costoTotalXCerdo > 0 ? (val / base.costoTotalXCerdo * 100).toFixed(1) : 0;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--borde2)">
          <span style="font-size:13px;color:var(--crema-d)">${lbl}</span>
          <span style="font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--crema)">${fmt(val, moneda)} <span style="font-size:11px;color:var(--crema-d);font-family:'DM Sans',sans-serif">${pct}%</span></span>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:12px;padding:14px;background:var(--bg3);border-radius:8px;border:1px solid var(--borde);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:600;color:var(--blanco)">COSTO TOTAL / cerdo vendido</span>
      <span style="font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:var(--oro)">${fmtFull(base.costoTotalXCerdo, moneda)}</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="goTo('parametros')">← Ajustar parámetros</button>
    <button class="btn-primary" onclick="window.print()">Exportar diagnóstico ↓</button>
  </div>`;
}

goTo('granja');
</script>
